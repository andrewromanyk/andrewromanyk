<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="maven-gradle-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C71A36" /> 
      <stop offset="100%" stop-color="#1DC9B7" /> 
    </linearGradient>
  </defs>

  <rect x="5" y="5" width="890" height="590" rx="30" ry="30" fill="#171717" stroke="#3ED9C9" stroke-width="5" stroke-dasharray="20,10"/>

  <text x="50" y="90" fill="#E2E8F0" font-family="sans-serif" font-size="22" font-weight="bold">Me</text>
  
  <text x="50" y="130" fill="#94A3B8" font-family="sans-serif" font-size="16">
    <tspan x="50" dy="0">Systems programmer and backend engineer. Focused on desktop-oriented</tspan>
    <tspan x="50" dy="26">architecture and hardware I/O. Experienced in optimizing large-scale</tspan>
    <tspan x="50" dy="26">neural networks to ONNX format for NPU execution, alongside building</tspan>
    <tspan x="50" dy="26">robust microservice infrastructures.</tspan>
  </text>

  <text x="50" y="320" fill="#E2E8F0" font-family="sans-serif" font-size="22" font-weight="bold">Languages</text>
  
  <g transform="translate(50, 345)">
    <g transform="translate(0, 0)">
      <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#f34b7d" stroke-width="2"/>
      <text x="40" y="16" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">C++</text>
    </g>
    <g transform="translate(95, 0)">
      <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#dea584" stroke-width="2"/>
      <text x="40" y="16" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Rust</text>
    </g>
    <g transform="translate(190, 0)">
      <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#b07219" stroke-width="2"/>
      <text x="40" y="16" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Java</text>
    </g>

    <g transform="translate(0, 45)">
      <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#A97BFF" stroke-width="2"/>
      <text x="40" y="16" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Kotlin</text>
    </g>
    <g transform="translate(95, 45)">
      <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#3572A5" stroke-width="2"/>
      <text x="40" y="16" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Python</text>
    </g>
    <g transform="translate(190, 45)">
      <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#5e5086" stroke-width="2"/>
      <text x="40" y="16" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Haskell</text>
    </g>

    <g transform="translate(0, 90)">
      <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#74283c" stroke-width="2"/>
      <text x="40" y="16" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Prolog</text>
    </g>
  </g>

  <text x="420" y="320" fill="#E2E8F0" font-family="sans-serif" font-size="22" font-weight="bold">Technologies</text>
  
  <g transform="translate(420, 345)">
    <g transform="translate(0, 0)">
      <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#064F8C" stroke-width="2"/>
      <text x="40" y="16" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">CMake</text>
    </g>
    <g transform="translate(95, 0)">
      <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#41CD52" stroke-width="2"/>
      <text x="40" y="16" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Qt</text>
    </g>
    <g transform="translate(190, 0)">
      <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#6DB33F" stroke-width="2"/>
      <text x="40" y="16" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Spring</text>
    </g>

    <g transform="translate(0, 45)">
      <rect width="115" height="30" rx="15" fill="#1E1E1E" stroke="url(#maven-gradle-grad)" stroke-width="2"/>
      <text x="57.5" y="16" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Maven/Gradle</text>
    </g>
    <g transform="translate(135, 45)">
