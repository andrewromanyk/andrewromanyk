name: Update Language Stats SVG

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch: # Enables a manual trigger button in the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate Dynamic SVG
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python script.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add image.svg
          # Abort the commit if the SVG generated is identical to the current one
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update language stats"
          git push
