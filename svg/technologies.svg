<svg width="474" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="maven-gradle-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C71A36" /> 
      <stop offset="100%" stop-color="#1DC9B7" /> 
    </linearGradient>
  </defs>
  <style>
    .animated-border { stroke-dasharray: 20, 10; animation: dash-flow 2s linear infinite; }
    @keyframes dash-flow { from { stroke-dashoffset: 30; } to { stroke-dashoffset: 0; } }
  </style>
  <rect x="5" y="5" width="464" height="170" rx="15" ry="15" fill="#171717" stroke="#3ED9C9" stroke-width="3" class="animated-border"/>
  <text x="40" y="45" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="22" font-weight="bold">Technologies</text>
  <g transform="translate(40, 75)">
    <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#064F8C" stroke-width="2"/>
    <text x="40.0" y="16" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">CMake</text>
  </g>
  <g transform="translate(135, 75)">
    <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#41CD52" stroke-width="2"/>
    <text x="40.0" y="16" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Qt</text>
  </g>
  <g transform="translate(230, 75)">
    <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#6DB33F" stroke-width="2"/>
    <text x="40.0" y="16" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Spring</text>
  </g>
  <g transform="translate(40, 120)">
