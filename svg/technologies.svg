    <text x="57.5" y="16" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Maven/Gradle</text>
  </g>
  <g transform="translate(170, 120)">
    <rect width="80" height="30" rx="15" fill="#1E1E1E" stroke="#FCC624" stroke-width="2"/>
    <text x="40.0" y="16" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Linux</text>
